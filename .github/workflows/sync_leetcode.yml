name: Sync LeetCode
on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Sync Submissions
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: |
          python -c '
          import os, requests, json

          EXT_MAP = {
              "cpp": "cpp", "java": "java", "python": "py", "python3": "py",
              "c": "c", "csharp": "cs", "javascript": "js", "typescript": "ts",
              "ruby": "rb", "swift": "swift", "golang": "go", "kotlin": "kt"
          }

          session = os.environ.get("LEETCODE_SESSION", "")
          csrf = os.environ.get("LEETCODE_CSRF_TOKEN", "")

          headers = {
              "Cookie": "LEETCODE_SESSION=" + session + "; csrftoken=" + csrf + ";",
              "X-CSRFToken": csrf,
              "Referer": "https://leetcode.com",
              "Content-Type": "application/json",
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
          }

          # 1. Fetch recent accepted submissions list
          list_query = """
          query submissionList($offset: Int!, $limit: Int!) {
            submissionList(offset: $offset, limit: $limit, statusDisplay: "Accepted") {
              submissions {
                id title titleSlug lang
              }
            }
          }
          """
          
          resp = requests.post("https://leetcode.com/graphql", json={"query": list_query, "variables": {"offset": 0, "limit": 20}}, headers=headers)
          subs = resp.json().get("data", {}).get("submissionList", {}).get("submissions", [])
          
          print(f"Found {len(subs)} accepted submissions to check.")

          for sub in subs:
              # 2. Query individual submission details via GraphQL to get the raw source code
              detail_query = """
              query submissionDetails($submissionId: Int!) {
                submissionDetails(submissionId: $submissionId) {
                  code
                  question {
                    questionFrontendId
                  }
                }
              }
              """
              
              d_resp = requests.post("https://leetcode.com/graphql", json={"query": detail_query, "variables": {"submissionId": int(sub["id"])}}, headers=headers)
              d_data = d_resp.json().get("data", {}).get("submissionDetails", {})
              
              raw_code = d_data.get("code")
              frontend_id = d_data.get("question", {}).get("questionFrontendId", "0000")

              if raw_code:
                  lang_lower = sub["lang"].lower()
                  ext = EXT_MAP.get(lang_lower, "txt")
                  
                  dir_name = "Solutions/" + frontend_id + "-" + sub["titleSlug"]
                  os.makedirs(dir_name, exist_ok=True)
                  
                  file_path = dir_name + "/Solution." + ext
                  with open(file_path, "w") as f:
                      f.write(raw_code)
                  print(f"Successfully processed: {frontend_id} - {sub['title']}")

          # 3. Push changes
          os.system("git config --global user.name \"GitHub Action\"")
          os.system("git config --global user.email \"action@github.com\"")
          os.system("git add .")
          os.system("git commit -m \"Sync latest LeetCode solutions\" || exit 0")
          os.system("git push")
          '
