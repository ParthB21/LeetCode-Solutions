name: Sync LeetCode

# Daily cloud sync of accepted submissions into this repo.
# Requires two repo secrets (Settings -> Secrets and variables -> Actions):
#   LEETCODE_SESSION    - your LEETCODE_SESSION cookie
#   LEETCODE_CSRFTOKEN  - your csrftoken cookie
#
# Cookies expire ~every 14 days. When that happens this job FAILS on purpose,
# and GitHub emails you so you know to refresh the two secrets above.

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write           # needed to commit & push synced solutions

concurrency:
  group: leetcode-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check cookie expiry (warning only)
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
        run: python check_cookie.py || true

      - name: Sync and push
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRFTOKEN: ${{ secrets.LEETCODE_CSRFTOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python sync.py --push
